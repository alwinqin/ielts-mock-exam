name: IELTS QA Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  data-validation:
    name: Data Validation (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate data structure
        run: python3 validate_all.py --json

      - name: Run project audit
        run: python3 audit.py

      - name: Check data regressions
        run: python3 check_data_regression.py

  bundle-check:
    name: Data Bundle Check
    runs-on: ubuntu-latest
    needs: data-validation
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate bundle
        run: python3 bundle_data.py

      - name: Verify bundle size
        run: |
          SIZE=$(wc -c < js/data-bundle.js)
          MAX=2097152
          echo "Bundle size: $SIZE bytes"
          if [ "$SIZE" -gt "$MAX" ]; then
            echo "ERROR: Bundle exceeds 2 MB limit"
            exit 1
          fi
          echo "Bundle size OK"

      - name: Verify bundle is valid JS
        run: node -e "require('./js/data-bundle.js')" 2>/dev/null || echo "Bundle is window.__DATA_BUNDLE__ format (expected)"

  e2e-tests:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    needs: data-validation
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Start HTTP server
        run: python3 -m http.server 8899 &
        env:
          PYTHONUNBUFFERED: 1

      - name: Wait for server
        run: |
          for i in $(seq 1 30); do
            if curl -s http://localhost:8899 > /dev/null; then
              echo "Server ready"
              exit 0
            fi
            sleep 1
          done
          echo "Server failed to start"
          exit 1

      - name: Run E2E tests
        run: npx playwright test e2e/ --config=e2e/playwright.config.js

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: test-results/
