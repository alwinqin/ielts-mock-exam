<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <title data-i18n="appTitle">IELTS Mock Test</title>
  <link rel="stylesheet" href="css/style.css?v=2">
</head>
<body>
  <div id="app">
    <header id="header">
      <a href="#/" class="logo" data-i18n="appTitle">雅思模拟考试</a>
      <div class="header-right">
        <button id="themeToggle" onclick="toggleTheme()" aria-label="Toggle dark mode" style="background:rgba(255,255,255,0.15);color:#fff;border:1px solid rgba(255,255,255,0.3);padding:6px 10px;border-radius:4px;font-size:0.85rem;margin-right:8px;">☀</button>
        <button id="langToggle" onclick="switchLang(i18n.currentLang === 'zh' ? 'en' : 'zh')">English</button>
      </div>
    </header>
    <main id="mainContent">
      <div class="loading" data-i18n="loading">加载中...</div>
    </main>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js" defer></script>
  <script src="js/data-bundle.js?v=4" defer></script>
  <script src="js/i18n.js?v=4"></script>
  <script src="js/data.js?v=4"></script>
  <script src="js/modal.js?v=1"></script>
  <script src="js/cambridge-adapter.js?v=4"></script>
  <script src="js/review.js?v=4"></script>
  <script src="js/history.js?v=4"></script>
  <script src="js/timer.js?v=4"></script>
  <script src="js/exam.js?v=4"></script>
  <script src="js/listening.js?v=5"></script>
  <script src="js/listening-review.js?v=4"></script>
  <script src="js/writing.js?v=4"></script>
  <script src="js/writing-review.js?v=4"></script>
  <script src="js/speaking.js?v=4"></script>
  <script src="js/wrong-book.js?v=4"></script>
  <script src="js/dashboard.js?v=4"></script>
  <script src="js/app.js?v=4"></script>
</body>
</html>
